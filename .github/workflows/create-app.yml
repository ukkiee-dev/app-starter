name: Create App

# app-starter 템플릿 파생 레포에서 해당 앱을 homelab 에 등록 (DNS + Tunnel + 매니페스트 + ArgoCD).
# 템플릿 레포 자체에서는 스킵.
#
# Phase 0B 옵션 A (2026-06-04): workflow_call → repository_dispatch 전환.
# homelab 의 dispatch-mutation.yml 이 단일 concurrency group(homelab-mutation)으로 모든
# 앱 레포의 mutation 을 cross-repo 직렬화한다. 앱 레포는 HOMELAB_APP_ID/KEY 만 있으면 되고,
# TF/R2/CF 인프라 시크릿은 homelab dispatcher 가 보유한다(시크릿 분산 제거).

on:
  workflow_dispatch:
    inputs:
      service-name:
        description: "모노레포 서비스 이름 (services/<name>). pnpm workspace 구조와 일치."
        required: true
        type: string
      subdomain:
        description: "서브도메인 (비우면 <repo>-<service>). DNS 레코드에 반영."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  # .app-config.yml 을 앱 레포에서 읽어 payload 로 전달.
  # (homelab token 이 repositories: homelab 으로 제한되어 앱 레포 checkout 불가하기 때문)
  read-config:
    if: github.repository != 'ukkiee-dev/app-starter'
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.cat.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - id: cat
        env:
          SERVICE: ${{ inputs.service-name }}
        run: |
          set -euo pipefail
          CONFIG_PATH="services/${SERVICE}/.app-config.yml"
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "::error::${CONFIG_PATH} not found. pnpm service:add 로 서비스를 먼저 생성하세요."
            exit 1
          fi
          {
            echo "config<<__EOF__"
            cat "$CONFIG_PATH"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

  dispatch:
    needs: read-config
    if: github.repository != 'ukkiee-dev/app-starter'
    runs-on: ubuntu-latest
    steps:
      - name: Generate homelab token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMELAB_APP_ID }}
          private-key: ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Dispatch create-app to homelab
        env:
          TOKEN: ${{ steps.token.outputs.token }}
          APP_NAME: ${{ github.event.repository.name }}
          SERVICE_NAME: ${{ inputs.service-name }}
          SUBDOMAIN: ${{ inputs.subdomain }}
          CONFIG_YAML: ${{ needs.read-config.outputs.config }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg app "$APP_NAME" --arg svc "$SERVICE_NAME" \
            --arg sub "$SUBDOMAIN" --arg cfg "$CONFIG_YAML" \
            '{event_type:"create-app",client_payload:{app_name:$app,service_name:$svc,subdomain:$sub,config_yaml:$cfg}}')
          curl -sS --fail -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ukkiee-dev/homelab/dispatches" \
            -d "$PAYLOAD"
          echo "::notice::create-app dispatch 전송 완료 (app=$APP_NAME service=$SERVICE_NAME). 결과는 homelab Actions/Telegram 에서 확인."
