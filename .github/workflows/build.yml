name: Build & Deploy

# Phase 0B мҳөм…ҳ A (2026-06-04): manifest к°ұмӢ /health sync лҘј workflow_call вҶ’ repository_dispatch
# лЎң м „нҷҳ. мқҙлҜём§Җ л№Ңл“ң(build-and-push action)лҠ” к·ёлҢҖлЎң. homelab dispatch-mutation.yml мқҙ
# homelab-mutation concurrency лЎң cross-repo м§Ғл ¬нҷ”.

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  discover:
    if: github.repository != 'ukkiee-dev/app-starter'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.scan.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: scan
        run: |
          set -euo pipefail
          SERVICES=$(find services -mindepth 2 -maxdepth 2 -name Dockerfile 2>/dev/null \
            | awk -F/ '{print $2}' | sort -u | jq -R . | jq -sc .)
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "л°ңкІ¬лҗң м„ңл№„мҠӨ: $SERVICES"

  config:
    if: github.repository != 'ukkiee-dev/app-starter'
    needs: discover
    runs-on: ubuntu-latest
    outputs:
      setup-done:      ${{ steps.check.outputs.exists }}
      app-name:        ${{ github.event.repository.name }}
      health-services: ${{ steps.health-diff.outputs.services }}
    steps:
      - name: Check homelab project shell exists
        id: check
        env:
          APP_NAME: ${{ github.event.repository.name }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/ukkiee-dev/homelab/contents/manifests/apps/${APP_NAME}/kustomization.yaml")
          EXISTS=$([ "$STATUS" = "200" ] && echo "true" || echo "false")
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
          if [ "$EXISTS" = "false" ]; then
            echo "::notice::homelabм—җ н”„лЎңм қнҠёк°Җ м—ҶмҠөлӢҲлӢӨ. create-app.yml(service-name=<svc>) лЁјм Җ dispatch н•ҳм„ёмҡ”."
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.exists == 'true'
        with:
          fetch-depth: 0

      - name: Detect services with changed .app-config.yml
        if: steps.check.outputs.exists == 'true'
        id: health-diff
        env:
          BEFORE:       ${{ github.event.before }}
          ALL_SERVICES: ${{ needs.discover.outputs.services }}
        run: |
          set -euo pipefail
          CHANGED="[]"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            CHANGED="$ALL_SERVICES"
          else
            DIFF=$(git diff "$BEFORE" HEAD --name-only | grep -E '^services/[^/]+/\.app-config\.yml$' || true)
            if [ -n "$DIFF" ]; then
              CHANGED=$(echo "$DIFF" | awk -F/ '{print $2}' | sort -u | jq -R . | jq -sc .)
            fi
          fi
          echo "services=$CHANGED" >> "$GITHUB_OUTPUT"
          echo ".app-config.yml ліҖкІҪ м„ңл№„мҠӨ: $CHANGED"

  quality:
    if: github.repository != 'ukkiee-dev/app-starter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test

  build:
    needs: [discover, config, quality]
    if: needs.config.outputs.setup-done == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ukkiee-dev/homelab/.github/actions/build-and-push@main
        with:
          app-name:     ${{ needs.config.outputs.app-name }}
          service:      ${{ matrix.service }}
          image-tag:    ${{ github.sha }}
          platforms:    linux/amd64,linux/arm64
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify failure (Telegram)
        if: failure()
        env:
          APP_NAME: ${{ needs.config.outputs.app-name }}
          SERVICE:  ${{ matrix.service }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then exit 0; fi
          curl -sS --fail -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=вқҢ л№Ңл“ң мӢӨнҢЁ: ${APP_NAME}/${SERVICE}%0A${RUN_URL}" || true

  # мқҙлҜём§Җ л§ӨлӢҲнҺҳмҠӨнҠё к°ұмӢ  вҶ’ homelab м—җ update-image dispatch (м„ңл№„мҠӨлі„)
  update-manifest:
    needs: [discover, config, build]
    if: needs.config.outputs.setup-done == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.services) }}
    steps:
      - name: Generate homelab token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMELAB_APP_ID }}
          private-key: ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Dispatch update-image to homelab
        env:
          TOKEN: ${{ steps.token.outputs.token }}
          APP_NAME: ${{ needs.config.outputs.app-name }}
          SERVICE_NAME: ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg app "$APP_NAME" --arg svc "$SERVICE_NAME" --arg tag "$IMAGE_TAG" \
            '{event_type:"update-image",client_payload:{app_name:$app,service_name:$svc,image_tag:$tag}}')
          curl -sS --fail -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ukkiee-dev/homelab/dispatches" \
            -d "$PAYLOAD"
          echo "::notice::update-image dispatch ($APP_NAME/$SERVICE_NAME @ ${IMAGE_TAG})"

  # health ліҖкІҪлҗң м„ңл№„мҠӨл“Өмқҳ {service, health} мҢҚ мӨҖл№„
  prepare-health-matrix:
    needs: [config]
    if: needs.config.outputs.setup-done == 'true' && needs.config.outputs.health-services != '[]'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: mikefarah/yq@v4
      - id: build
        env:
          SERVICES: ${{ needs.config.outputs.health-services }}
        run: |
          set -euo pipefail
          MATRIX="[]"
          for svc in $(jq -r '.[]' <<< "$SERVICES"); do
            CFG="services/$svc/.app-config.yml"
            [ -f "$CFG" ] || continue
            H=$(yq '.health // ""' "$CFG")
            [ -z "$H" ] && continue
            MATRIX=$(jq --arg s "$svc" --arg h "$H" '. + [{"service":$s,"health":$h}]' <<< "$MATRIX")
          done
          echo "matrix=$(jq -c . <<< "$MATRIX")" >> "$GITHUB_OUTPUT"
          echo "sync лҢҖмғҒ: $(jq -c . <<< "$MATRIX")"

  # health н•„л“ң вҶ’ homelab м—җ sync-app-config dispatch (м„ңл№„мҠӨлі„)
  sync-health:
    needs: [config, prepare-health-matrix, update-manifest]
    if: needs.prepare-health-matrix.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-health-matrix.outputs.matrix) }}
    steps:
      - name: Generate homelab token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMELAB_APP_ID }}
          private-key: ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Dispatch sync-app-config to homelab
        env:
          TOKEN: ${{ steps.token.outputs.token }}
          APP_NAME: ${{ needs.config.outputs.app-name }}
          SERVICE_NAME: ${{ matrix.service }}
          HEALTH: ${{ matrix.health }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg app "$APP_NAME" --arg svc "$SERVICE_NAME" --arg health "$HEALTH" \
            '{event_type:"sync-app-config",client_payload:{app_name:$app,service_name:$svc,health:$health}}')
          curl -sS --fail -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ukkiee-dev/homelab/dispatches" \
            -d "$PAYLOAD"
          echo "::notice::sync-app-config dispatch ($APP_NAME/$SERVICE_NAME health=$HEALTH)"
