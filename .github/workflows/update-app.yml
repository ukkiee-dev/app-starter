name: Update App (reconcile)

# services/<svc>/.app-config.yml 변경 푸시 시 자동 reconcile (현재: database 블록 추가).
# Phase 0B 옵션 A (2026-06-04): workflow_call → repository_dispatch 전환.
# homelab dispatch-mutation.yml(homelab-mutation concurrency)이 cross-repo 직렬화.
#
# destructive 케이스는 homelab setup-app/database composite 가 warn/error 처리.
# health 변경은 build.yml 의 sync-app-config dispatch 로 동기화 (icon/description 은 homelab apps.json SoT 라 동기화 대상 아님).

on:
  push:
    branches: [main]
    paths:
      - 'services/*/.app-config.yml'
  workflow_dispatch:
    inputs:
      service-name:
        description: "재실행할 서비스 이름 (services/<name>)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  discover:
    if: github.repository != 'ukkiee-dev/app-starter'
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.target.outputs.service }}
      config: ${{ steps.target.outputs.config }}
      setup-done: ${{ steps.shell.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # diff BEFORE..AFTER 위해 이전 커밋 필요

      - name: Resolve reconcile target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          MANUAL_SERVICE: ${{ github.event.inputs.service-name || '' }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SERVICE="$MANUAL_SERVICE"
            if [ -z "$SERVICE" ]; then
              echo "::error::workflow_dispatch 는 service-name 입력이 필요합니다."
              exit 1
            fi
            CONFIG_PATH="services/${SERVICE}/.app-config.yml"
            if [ ! -f "$CONFIG_PATH" ]; then
              echo "::error::${CONFIG_PATH} not found."
              exit 1
            fi
            echo "수동 reconcile 대상: $SERVICE"
          else
            if ! git cat-file -e "$BEFORE" 2>/dev/null; then
              echo "::warning::before commit ($BEFORE) 없음 — HEAD^ 로 fallback"
              BEFORE="HEAD^"
            fi

            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- 'services/*/.app-config.yml' || true)
            if [ -z "$CHANGED" ]; then
              echo "::notice::변경된 services/*/.app-config.yml 없음 — skip"
              echo "service=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            SERVICES=$(echo "$CHANGED" | awk -F/ '{print $2}' | sort -u)
            COUNT=$(echo "$SERVICES" | wc -l | tr -d ' ')

            if [ "$COUNT" -gt 1 ]; then
              echo "::warning::여러 서비스의 .app-config.yml 이 동시 변경됨 ($COUNT 개). 첫 번째 서비스만 이번 reconcile 대상."
              echo "  다른 서비스는 별도 push 로 수정하는 것을 권장합니다."
              while IFS= read -r svc; do
                echo "    - $svc"
              done <<< "$SERVICES"
            fi

            SERVICE=$(echo "$SERVICES" | head -1)
            CONFIG_PATH="services/${SERVICE}/.app-config.yml"

            if [ ! -f "$CONFIG_PATH" ]; then
              echo "::notice::${CONFIG_PATH} 가 현재 tree 에 없음 (삭제된 서비스?) — skip"
              echo "service=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "자동 reconcile 대상: $SERVICE"
          fi

          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          {
            echo "config<<__EOF__"
            cat "$CONFIG_PATH"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Check homelab project shell exists
        id: shell
        if: steps.target.outputs.service != ''
        env:
          APP_NAME: ${{ github.event.repository.name }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/ukkiee-dev/homelab/contents/manifests/apps/${APP_NAME}/kustomization.yaml")
          EXISTS=$([ "$STATUS" = "200" ] && echo "true" || echo "false")
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
          if [ "$EXISTS" = "false" ]; then
            echo "::notice::homelab 에 ${APP_NAME} 프로젝트 shell 이 없습니다. create-app.yml 을 먼저 dispatch 하세요. reconcile skip."
          fi

  # reconcile: database 블록 변경 → homelab 에 add-database dispatch
  reconcile-database:
    needs: discover
    if: needs.discover.outputs.setup-done == 'true' && needs.discover.outputs.service != ''
    runs-on: ubuntu-latest
    steps:
      - name: Generate homelab token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMELAB_APP_ID }}
          private-key: ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Dispatch add-database to homelab
        env:
          TOKEN: ${{ steps.token.outputs.token }}
          APP_NAME: ${{ github.event.repository.name }}
          SERVICE_NAME: ${{ needs.discover.outputs.service }}
          CONFIG_YAML: ${{ needs.discover.outputs.config }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg app "$APP_NAME" --arg svc "$SERVICE_NAME" --arg cfg "$CONFIG_YAML" \
            '{event_type:"add-database",client_payload:{app_name:$app,service_name:$svc,config_yaml:$cfg}}')
          curl -sS --fail -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ukkiee-dev/homelab/dispatches" \
            -d "$PAYLOAD"
          echo "::notice::add-database dispatch 전송 완료 (app=$APP_NAME service=$SERVICE_NAME)."
